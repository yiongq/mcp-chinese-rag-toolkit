name: Release

# Publishes @yiong/mcp-chinese-rag-toolkit to npm via Changesets +
# npm Trusted Publishing (OIDC, tokenless). When changeset files are present
# on main, changesets/action opens / updates a "Version Packages" PR; when that
# PR merges (changesets consumed), this same workflow runs `pnpm release`
# (= `changeset publish`) and publishes with a provenance attestation.
#
# Prerequisite (one-time, maintainer-only, see RELEASING.md): npmjs.com →
# @yiong/mcp-chinese-rag-toolkit → Settings → Trusted Publisher configured for
# owner `yiongq`, repo `mcp-chinese-rag-toolkit`, workflow `release.yml`.

on:
  push:
    branches: [main]

permissions:
  contents: write # changesets opens the Version PR / tags the release
  pull-requests: write # changesets maintains the Version PR
  id-token: write # OIDC trusted publishing (REQUIRED — tokenless publish)

# NOTE: deliberately NO `concurrency.cancel-in-progress: true` on main —
# cancelling an in-flight release on the next merge produces a half-published
# release (some packages published, tags/version-PR inconsistent). See
# deferred-work.md G2.

jobs:
  release:
    name: Version / Publish (Changesets + provenance)
    runs-on: ubuntu-latest # Trusted Publishing requires a cloud-hosted runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'

      # Node 22 ships npm 10.x; Trusted Publishing (OIDC) needs npm >= 11.5.1.
      - name: Upgrade npm to latest (>= 11.5.1 for OIDC)
        run: npm i -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (tsdown + publint gates)
        run: pnpm build

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          # `pnpm run …` (not bare `pnpm version`): `version` is a pnpm built-in
          # command that shadows the npm script, so `pnpm version` would print a
          # version dump and NEVER run `changeset version` (changesets unconsumed,
          # no bump, no CHANGELOG). `run` forces the package.json script.
          publish: pnpm run release # = changeset publish
          version: pnpm run version # = changeset version (updates CHANGELOG + package.json)
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          # Provenance intent — belt-and-suspenders with publishConfig.provenance.
          NPM_CONFIG_PROVENANCE: 'true'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN: OIDC Trusted Publishing is tokenless. The old personal
          # token was revoked end-2025; do not reintroduce it (deferred-work.md G6).
